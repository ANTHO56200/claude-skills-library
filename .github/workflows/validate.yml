name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          fail=0
          for f in */SKILL.md; do
            d=$(dirname "$f")
            head -1 "$f" | grep -qx -- "---" || { echo "::error file=$f::first line must be '---' (YAML frontmatter)"; fail=1; continue; }
            fm=$(awk '/^---$/{n++; next} n==1{print} n==2{exit}' "$f")
            echo "$fm" | grep -q "^name:" || { echo "::error file=$f::frontmatter missing 'name:'"; fail=1; }
            echo "$fm" | grep -q "^description:" || { echo "::error file=$f::frontmatter missing 'description:'"; fail=1; }
            name=$(echo "$fm" | awk '/^name:/{sub(/^name:[ \t]*/,""); print; exit}')
            [ "$name" = "$d" ] || { echo "::error file=$f::frontmatter name '$name' must match folder name '$d'"; fail=1; }
          done
          [ $fail -eq 0 ] && echo "All skills valid."
          exit $fail
      - name: Check skills.json is in sync
        run: |
          n_dirs=$(ls -d */ | grep -v "^\." | wc -l)
          n_json=$(grep -c '"slug"' skills.json)
          [ "$n_dirs" -eq "$n_json" ] && echo "skills.json in sync ($n_json entries)." || { echo "::error::skills.json has $n_json entries but repo has $n_dirs skill folders"; exit 1; }
